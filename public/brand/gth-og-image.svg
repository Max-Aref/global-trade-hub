<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#190d2e"/>
      <stop offset="100%" stop-color="#04010a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8c45ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8c45ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="315" rx="500" ry="350" fill="url(#glow)"/>

  <!-- Decorative rings -->
  <circle cx="600" cy="315" r="260" fill="none" stroke="rgba(140,69,255,0.12)" stroke-width="1"/>
  <circle cx="600" cy="315" r="320" fill="none" stroke="rgba(140,69,255,0.07)" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- Globe icon mark (left aligned) -->
  <g transform="translate(160, 240)">
    <circle cx="70" cy="70" r="65" fill="none" stroke="#8c45ff" stroke-width="3"/>
    <ellipse cx="70" cy="70" rx="65" ry="26" fill="none" stroke="#8c45ff" stroke-width="2" opacity="0.6"/>
    <ellipse cx="70" cy="70" rx="65" ry="26" fill="none" stroke="#8c45ff" stroke-width="2" opacity="0.6" transform="rotate(90, 70, 70)"/>
    <line x1="70" y1="5" x2="70" y2="135" stroke="#8c45ff" stroke-width="2" opacity="0.4"/>
    <circle cx="70" cy="70" r="8" fill="#8c45ff"/>
  </g>

  <!-- Brand name -->
  <text x="290" y="295" font-family="Inter,system-ui,sans-serif" font-size="56" font-weight="800" fill="#8c45ff" letter-spacing="-1">Global Trade Hub</text>

  <!-- Tagline -->
  <text x="292" y="355" font-family="Inter,system-ui,sans-serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.65)">Egypt Exports. Global Buyers.</text>

  <!-- Divider -->
  <line x1="292" y1="385" x2="900" y2="385" stroke="rgba(140,69,255,0.3)" stroke-width="1"/>

  <!-- Stats row -->
  <text x="292" y="435" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700" fill="#8c45ff">50,000+</text>
  <text x="292" y="462" font-family="Inter,system-ui,sans-serif" font-size="15" fill="rgba(255,255,255,0.45)">Active Buyers</text>

  <text x="510" y="435" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700" fill="#8c45ff">$0</text>
  <text x="510" y="462" font-family="Inter,system-ui,sans-serif" font-size="15" fill="rgba(255,255,255,0.45)">To Start</text>

  <text x="640" y="435" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700" fill="#8c45ff">+300%</text>
  <text x="640" y="462" font-family="Inter,system-ui,sans-serif" font-size="15" fill="rgba(255,255,255,0.45)">Avg Sales Growth</text>

  <!-- URL -->
  <text x="600" y="580" font-family="Inter,system-ui,sans-serif" font-size="18" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="2">globaltradehub.com</text>
</svg>
