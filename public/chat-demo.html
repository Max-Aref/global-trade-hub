<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTH Chat Assistant Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .container {
      max-width: 800px;
      padding: 40px 20px;
      text-align: center;
    }
    
    h1 {
      font-size: 48px;
      font-weight: 600;
      margin-bottom: 16px;
      background: linear-gradient(to bottom, #ffffff, #8c45ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    p {
      font-size: 20px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      color: #8c45ff;
    }
    
    .arrow {
      position: fixed;
      bottom: 120px;
      right: 100px;
      color: #8c45ff;
      font-size: 48px;
      animation: bounce 2s infinite;
    }
    
    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-20px);
      }
    }
    
    .instructions {
      background: #190d2e;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 24px;
      margin-top: 40px;
      text-align: left;
    }
    
    .instructions h2 {
      color: #8c45ff;
      font-size: 24px;
      margin-bottom: 16px;
    }
    
    .instructions ul {
      list-style: none;
      padding: 0;
    }
    
    .instructions li {
      padding: 8px 0 8px 28px;
      position: relative;
      color: rgba(255, 255, 255, 0.8);
    }
    
    .instructions li:before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #8c45ff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 512 512">
        <path d="M352,256c0-114.9-93.1-208-208-208S-64,141.1-64,256s93.1,208,208,208S352,370.9,352,256z M144,64c69.9,0,128,78.4,128,192s-58.1,192-128,192S16,369.6,16,256S74.1,64,144,64z"/>
      </svg>
    </div>
    
    <h1>Global Trade Hub</h1>
    <p>AI Chat Assistant is now live on your website!</p>
    
    <div class="instructions">
      <h2>✨ Try It Out</h2>
      <ul>
        <li>Look for the purple globe button in the bottom-right corner</li>
        <li>Click it to open the chat assistant</li>
        <li>Try asking: "What are HS codes?"</li>
        <li>Or select one of the sample questions</li>
      </ul>
    </div>
  </div>
  
  <div class="arrow">↘</div>
  
  <!-- Load GTH Chat Assistant -->
  <script src="/ai-chat-assistant/index.js"></script>
  <script>
    GTHChat.init({
      apiKey: 'demo-mode',
      theme: {
        primaryColor: '#8c45ff',
        secondaryColor: '#190d2e',
        accentColor: '#4a208a',
        position: 'bottom-right'
      },
      greeting: 'Welcome to Global Trade Hub! How can I assist you with your trade inquiries today?',
      placeholder: 'Ask about trade, logistics, regulations...',
      persistHistory: true
    });
  </script>
</body>
</html>
