<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img">
  <title>Trade network connecting Egypt to US buyers</title>

  <defs>
    <pattern id="dots-b" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="rgba(140,69,255,0.12)"/>
    </pattern>
    <radialGradient id="bg-b" cx="50%" cy="44%" r="70%">
      <stop offset="0%" stop-color="#1c0d38"/>
      <stop offset="100%" stop-color="#04010a"/>
    </radialGradient>
    <linearGradient id="arc-grad-b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8c45ff"/>
      <stop offset="100%" stop-color="#b665ff"/>
    </linearGradient>
    <radialGradient id="cairo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8c45ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#8c45ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nyc-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b665ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#b665ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="arc-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .arc-route {
      stroke-dasharray: 8 5;
      animation: marchRoute 2s linear infinite;
    }
    @keyframes marchRoute { to { stroke-dashoffset: -52; } }

    .sat-line { animation: blinkLine 3s ease-in-out infinite; }
    .sat-l2   { animation-delay: 0.75s; }
    .sat-l3   { animation-delay: 1.5s; }
    .sat-l4   { animation-delay: 2.25s; }
    @keyframes blinkLine { 0%,100% { opacity: 0.07; } 50% { opacity: 0.32; } }
  </style>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg-b)"/>
  <rect width="400" height="250" fill="url(#dots-b)"/>

  <!-- Globe outline -->
  <circle cx="200" cy="128" r="90" fill="none" stroke="rgba(140,69,255,0.13)" stroke-width="1"/>

  <!-- Latitude ellipses (give 3-D sphere illusion) -->
  <ellipse cx="200" cy="98"  rx="76" ry="11" fill="none" stroke="rgba(140,69,255,0.07)" stroke-width="1"/>
  <ellipse cx="200" cy="128" rx="90" ry="14" fill="none" stroke="rgba(140,69,255,0.07)" stroke-width="1"/>
  <ellipse cx="200" cy="158" rx="76" ry="11" fill="none" stroke="rgba(140,69,255,0.07)" stroke-width="1"/>

  <!-- Meridian paths -->
  <line x1="200" y1="38" x2="200" y2="218" stroke="rgba(140,69,255,0.06)" stroke-width="1"/>
  <path d="M 200,38 Q 248,83 248,128 Q 248,173 200,218" fill="none" stroke="rgba(140,69,255,0.05)" stroke-width="1"/>
  <path d="M 200,38 Q 152,83 152,128 Q 152,173 200,218" fill="none" stroke="rgba(140,69,255,0.05)" stroke-width="1"/>

  <!-- Satellite connection lines -->
  <line x1="244" y1="112" x2="305" y2="78"  class="sat-line"      stroke="#8c45ff" stroke-width="1"/>
  <line x1="244" y1="112" x2="300" y2="158" class="sat-line sat-l2" stroke="#8c45ff" stroke-width="1"/>
  <line x1="152" y1="106" x2="90"  cy="76"  class="sat-line sat-l3" stroke="#b665ff" stroke-width="1"/>
  <line x1="152" y1="106" x2="97"  y2="160" class="sat-line sat-l4" stroke="#b665ff" stroke-width="1"/>

  <!-- Satellite nodes -->
  <circle cx="305" cy="78"  r="4" fill="rgba(140,69,255,0.55)"/>
  <circle cx="300" cy="158" r="3" fill="rgba(140,69,255,0.42)"/>
  <circle cx="90"  cy="76"  r="4" fill="rgba(182,101,255,0.55)"/>
  <circle cx="97"  cy="160" r="3" fill="rgba(182,101,255,0.42)"/>

  <!-- Cairo glow halo -->
  <ellipse cx="244" cy="112" rx="28" ry="28" fill="url(#cairo-glow)"/>
  <!-- Cairo pulse ring (SMIL on r + opacity) -->
  <circle cx="244" cy="112" r="11" fill="none" stroke="#8c45ff" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r"       values="11;29;11" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- NYC glow halo -->
  <ellipse cx="152" cy="106" rx="28" ry="28" fill="url(#nyc-glow)"/>
  <!-- NYC pulse ring -->
  <circle cx="152" cy="106" r="11" fill="none" stroke="#b665ff" stroke-width="1.5" opacity="0.5">
    <animate attributeName="r"       values="11;29;11" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5"  dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Animated trade-route arc -->
  <path d="M 244,112 Q 198,36 152,106"
        fill="none"
        stroke="url(#arc-grad-b)"
        stroke-width="2.5"
        stroke-linecap="round"
        filter="url(#arc-glow)"
        class="arc-route"/>

  <!-- Cairo node -->
  <circle cx="244" cy="112" r="9.5" fill="#3a1670"/>
  <circle cx="244" cy="112" r="6.5" fill="#8c45ff"/>
  <circle cx="244" cy="112" r="3.5" fill="#c987ff"/>
  <text x="244" y="133" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="9.5" font-weight="500" fill="rgba(255,255,255,0.62)">Cairo, Egypt</text>

  <!-- NYC node -->
  <circle cx="152" cy="106" r="9.5" fill="#3a1670"/>
  <circle cx="152" cy="106" r="6.5" fill="#8c45ff"/>
  <circle cx="152" cy="106" r="3.5" fill="#c987ff"/>
  <text x="152" y="92" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="9.5" font-weight="500" fill="rgba(255,255,255,0.62)">New York, USA</text>

  <!-- Stat badge -->
  <rect x="116" y="10" width="168" height="24" rx="12"
        fill="rgba(140,69,255,0.22)" stroke="rgba(140,69,255,0.48)" stroke-width="1"/>
  <text x="200" y="26" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="11" font-weight="600" fill="#b665ff">50,000+ Active Buyers</text>

  <!-- Bottom caption -->
  <text x="200" y="238" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="8.5" fill="rgba(255,255,255,0.22)" letter-spacing="1.2">
    VERIFIED · REAL-TIME · DIRECT ACCESS
  </text>
</svg>
