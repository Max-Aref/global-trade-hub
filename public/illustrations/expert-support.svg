<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img">
  <title>24/7 multilingual expert trade support</title>

  <defs>
    <pattern id="dots-e" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="rgba(140,69,255,0.10)"/>
    </pattern>
    <radialGradient id="bg-e" cx="50%" cy="46%" r="68%">
      <stop offset="0%" stop-color="#18093A"/>
      <stop offset="100%" stop-color="#04010a"/>
    </radialGradient>
    <radialGradient id="hub-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8c45ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8c45ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="hub-filter" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="badge-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    /* Signal rings expand outward from hub */
    .wave-ring { animation: expandWave 3s ease-out infinite; }
    .wave-r2   { animation: expandWave 3s ease-out infinite 1s; }
    .wave-r3   { animation: expandWave 3s ease-out infinite 2s; }
    @keyframes expandWave {
      0%   { r: 28; opacity: 0.55; }
      100% { r: 82; opacity: 0;    }
    }

    /* Language badge connector lines fade in/out with stagger */
    .conn { animation: connPulse 4s ease-in-out infinite; }
    .conn2 { animation-delay: 0.8s;  }
    .conn3 { animation-delay: 1.6s;  }
    .conn4 { animation-delay: 2.4s;  }
    .conn5 { animation-delay: 3.2s;  }
    @keyframes connPulse { 0%,100% { opacity: 0.08; } 50% { opacity: 0.38; } }

    /* Language badges appear one by one */
    .badge-pop { animation: badgeAppear 4s ease-in-out infinite; }
    .bp2 { animation-delay: 0.8s;  }
    .bp3 { animation-delay: 1.6s;  }
    .bp4 { animation-delay: 2.4s;  }
    .bp5 { animation-delay: 3.2s;  }
    @keyframes badgeAppear {
      0%,15%   { opacity: 0.3; transform: scale(0.92); }
      35%,65%  { opacity: 1;   transform: scale(1);    }
      85%,100% { opacity: 0.3; transform: scale(0.92); }
    }
  </style>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg-e)"/>
  <rect width="400" height="250" fill="url(#dots-e)"/>

  <!-- Hub glow -->
  <ellipse cx="200" cy="122" rx="90" ry="90" fill="url(#hub-glow)"/>

  <!-- Signal / broadcast rings (SMIL animated) -->
  <circle cx="200" cy="122" r="28" fill="none" stroke="rgba(140,69,255,0.55)" stroke-width="1.5" class="wave-ring">
    <animate attributeName="r"       values="28;82;28" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0;0.55" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="122" r="28" fill="none" stroke="rgba(140,69,255,0.40)" stroke-width="1.2" class="wave-r2">
    <animate attributeName="r"       values="28;82;28" dur="3s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.40;0;0.40" dur="3s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="122" r="28" fill="none" stroke="rgba(140,69,255,0.25)" stroke-width="1" class="wave-r3">
    <animate attributeName="r"       values="28;82;28" dur="3s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0;0.25" dur="3s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Hub inner circle (static) -->
  <circle cx="200" cy="122" r="34" fill="#190d2e" stroke="rgba(140,69,255,0.5)" stroke-width="1.5"/>
  <circle cx="200" cy="122" r="28" fill="#8c45ff" opacity="0.18"/>

  <!-- Headset icon (simplified SVG paths, centred in hub) -->
  <!-- Outer arc of headset -->
  <path d="M 184,116 A 18,18 0 0 1 216,116"
        fill="none" stroke="#8c45ff" stroke-width="3" stroke-linecap="round"/>
  <!-- Left ear cup -->
  <rect x="181" y="115" width="8" height="12" rx="3" fill="#8c45ff"/>
  <!-- Right ear cup -->
  <rect x="211" y="115" width="8" height="12" rx="3" fill="#8c45ff"/>
  <!-- Mic boom arm -->
  <path d="M 219,124 Q 224,128 222,133" fill="none" stroke="#8c45ff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="222" cy="134" r="2.5" fill="#b665ff"/>

  <!-- Connector lines from hub to each language badge (animated) -->
  <!-- EN — upper left:  (102, 72) -->
  <line x1="168" y1="104" x2="118" y2="78" class="conn"        stroke="#8c45ff" stroke-width="1"/>
  <!-- AR — upper right: (298, 72) -->
  <line x1="232" y1="104" x2="280" y2="78" class="conn conn2"  stroke="#b665ff" stroke-width="1"/>
  <!-- FR — left:        (72, 130) -->
  <line x1="166" y1="122" x2="108" y2="130" class="conn conn3" stroke="#8c45ff" stroke-width="1"/>
  <!-- ES — right:       (330, 130) -->
  <line x1="234" y1="122" x2="294" y2="130" class="conn conn4" stroke="#b665ff" stroke-width="1"/>
  <!-- TR — lower left:  (108, 174) -->
  <line x1="172" y1="140" x2="120" y2="170" class="conn conn5" stroke="#8c45ff" stroke-width="1"/>

  <!-- Language badge helper: rounded rect + label text -->
  <!-- EN -->
  <g class="badge-pop" filter="url(#badge-glow)">
    <rect x="86" y="62" width="38" height="22" rx="11"
          fill="rgba(140,69,255,0.22)" stroke="rgba(140,69,255,0.55)" stroke-width="1"/>
    <text x="105" y="77" text-anchor="middle"
          font-family="Inter,system-ui,sans-serif"
          font-size="10.5" font-weight="700" fill="rgba(255,255,255,0.85)">EN</text>
  </g>

  <!-- AR -->
  <g class="badge-pop bp2" filter="url(#badge-glow)">
    <rect x="268" y="62" width="38" height="22" rx="11"
          fill="rgba(140,69,255,0.22)" stroke="rgba(140,69,255,0.55)" stroke-width="1"/>
    <text x="287" y="77" text-anchor="middle"
          font-family="Cairo,system-ui,sans-serif"
          font-size="10.5" font-weight="700" fill="rgba(255,255,255,0.85)">عربي</text>
  </g>

  <!-- FR -->
  <g class="badge-pop bp3" filter="url(#badge-glow)">
    <rect x="56" y="120" width="38" height="22" rx="11"
          fill="rgba(140,69,255,0.22)" stroke="rgba(140,69,255,0.55)" stroke-width="1"/>
    <text x="75" y="135" text-anchor="middle"
          font-family="Inter,system-ui,sans-serif"
          font-size="10.5" font-weight="700" fill="rgba(255,255,255,0.85)">FR</text>
  </g>

  <!-- ES -->
  <g class="badge-pop bp4" filter="url(#badge-glow)">
    <rect x="294" y="120" width="38" height="22" rx="11"
          fill="rgba(140,69,255,0.22)" stroke="rgba(140,69,255,0.55)" stroke-width="1"/>
    <text x="313" y="135" text-anchor="middle"
          font-family="Inter,system-ui,sans-serif"
          font-size="10.5" font-weight="700" fill="rgba(255,255,255,0.85)">ES</text>
  </g>

  <!-- TR -->
  <g class="badge-pop bp5" filter="url(#badge-glow)">
    <rect x="92" y="162" width="38" height="22" rx="11"
          fill="rgba(140,69,255,0.22)" stroke="rgba(140,69,255,0.55)" stroke-width="1"/>
    <text x="111" y="177" text-anchor="middle"
          font-family="Inter,system-ui,sans-serif"
          font-size="10.5" font-weight="700" fill="rgba(255,255,255,0.85)">TR</text>
  </g>

  <!-- 24/7 badge (stat, top centre) -->
  <rect x="134" y="10" width="132" height="24" rx="12"
        fill="rgba(140,69,255,0.22)" stroke="rgba(140,69,255,0.48)" stroke-width="1"/>
  <text x="200" y="26" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="11" font-weight="700" fill="#b665ff">⚡ 24/7 Support</text>

  <!-- "ALWAYS ONLINE" label below hub -->
  <text x="200" y="175" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="10" font-weight="600" letter-spacing="2"
        fill="rgba(255,255,255,0.32)">ALWAYS ONLINE</text>

  <!-- Bottom caption -->
  <text x="200" y="238" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="8.5" fill="rgba(255,255,255,0.22)" letter-spacing="1.2">
    ARABIC · ENGLISH · FRENCH · SPANISH · MORE
  </text>
</svg>
