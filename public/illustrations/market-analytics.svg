<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img">
  <title>AI-powered market analytics showing business growth trend</title>

  <defs>
    <pattern id="dots-m" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="rgba(140,69,255,0.10)"/>
    </pattern>
    <radialGradient id="bg-m" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#160a30"/>
      <stop offset="100%" stop-color="#04010a"/>
    </radialGradient>
    <!-- Gradient fill under the line chart -->
    <linearGradient id="fill-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#8c45ff" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#8c45ff" stop-opacity="0.02"/>
    </linearGradient>
    <!-- Line gradient (colour shifts as it rises) -->
    <linearGradient id="line-m" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6b2fd9"/>
      <stop offset="60%"  stop-color="#8c45ff"/>
      <stop offset="100%" stop-color="#b665ff"/>
    </linearGradient>
    <filter id="line-glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dot-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    /* Line draws itself left → right, then holds, then restarts */
    .chart-line {
      stroke-dasharray: 620;
      stroke-dashoffset: 620;
      animation: drawLine 4s ease-out infinite;
    }
    @keyframes drawLine {
      0%, 5%  { stroke-dashoffset: 620; }
      55%     { stroke-dashoffset: 0; }
      88%, 100% { stroke-dashoffset: 0; }
    }

    /* Gradient fill fades in after line draws */
    .chart-fill {
      animation: fadeFill 4s ease-out infinite;
    }
    @keyframes fadeFill {
      0%, 40%   { opacity: 0; }
      70%, 100% { opacity: 1; }
    }

    /* +300% callout pops in */
    .callout {
      animation: popIn 4s ease-out infinite;
    }
    @keyframes popIn {
      0%, 60%  { opacity: 0; transform: scale(0.85); }
      80%, 100% { opacity: 1; transform: scale(1); }
    }
  </style>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg-m)"/>
  <rect width="400" height="250" fill="url(#dots-m)"/>

  <!-- Horizontal grid lines -->
  <g stroke="rgba(255,255,255,0.055)" stroke-width="1" stroke-dasharray="4 4">
    <line x1="48" y1="58"  x2="378" y2="58"/>
    <line x1="48" y1="98"  x2="378" y2="98"/>
    <line x1="48" y1="138" x2="378" y2="138"/>
    <line x1="48" y1="178" x2="378" y2="178"/>
    <line x1="48" y1="210" x2="378" y2="210"/>
  </g>

  <!-- Y-axis labels -->
  <g font-family="Inter,system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.28)" text-anchor="end">
    <text x="43" y="61">100%</text>
    <text x="43" y="101">75%</text>
    <text x="43" y="141">50%</text>
    <text x="43" y="181">25%</text>
    <text x="43" y="213">0%</text>
  </g>

  <!-- Left axis line -->
  <line x1="48" y1="40" x2="48" y2="213" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Background bars (low-opacity, hint of historical data) -->
  <g fill="rgba(140,69,255,0.10)">
    <rect x="102" y="178" width="16" height="32" rx="3"/>
    <rect x="162" y="148" width="16" height="62" rx="3"/>
    <rect x="222" y="108" width="16" height="102" rx="3"/>
    <rect x="282" y="72"  width="16" height="138" rx="3"/>
    <rect x="342" y="42"  width="16" height="168" rx="3"/>
  </g>

  <!--
    Data points: (50,210)(110,176)(170,146)(230,108)(290,72)(350,42)
    Smooth cubic bezier curve through these points
  -->

  <!-- Gradient fill (animated opacity) -->
  <path class="chart-fill"
    d="M 50,210
       C 76,205 94,180 110,176
       S 153,150 170,146
       S 213,112 230,108
       S 273,76  290,72
       S 330,45  350,42
       L 350,210 L 50,210 Z"
    fill="url(#fill-m)"/>

  <!-- Glowing line chart (animated stroke-dashoffset) -->
  <path class="chart-line"
    d="M 50,210
       C 76,205 94,180 110,176
       S 153,150 170,146
       S 213,112 230,108
       S 273,76  290,72
       S 330,45  350,42"
    fill="none"
    stroke="url(#line-m)"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#line-glow)"/>

  <!-- Data point circles (static, glow on top of line) -->
  <g filter="url(#dot-glow)">
    <circle cx="110" cy="176" r="5" fill="#8c45ff"/>
    <circle cx="110" cy="176" r="3" fill="#c987ff"/>
    <circle cx="170" cy="146" r="5" fill="#8c45ff"/>
    <circle cx="170" cy="146" r="3" fill="#c987ff"/>
    <circle cx="230" cy="108" r="5" fill="#8c45ff"/>
    <circle cx="230" cy="108" r="3" fill="#c987ff"/>
    <circle cx="290" cy="72"  r="5" fill="#8c45ff"/>
    <circle cx="290" cy="72"  r="3" fill="#c987ff"/>
    <circle cx="350" cy="42"  r="6" fill="#8c45ff"/>
    <circle cx="350" cy="42"  r="3.5" fill="#ffffff"/>
  </g>

  <!-- Pulse on the last (highest) data point -->
  <circle cx="350" cy="42" r="10" fill="none" stroke="#b665ff" stroke-width="1.2" opacity="0.4">
    <animate attributeName="r"       values="10;22;10" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5"  dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- +300% callout box (animated pop-in) -->
  <g class="callout">
    <rect x="284" y="14" width="100" height="36" rx="8"
          fill="rgba(16,185,129,0.15)" stroke="rgba(16,185,129,0.5)" stroke-width="1.2"/>
    <text x="334" y="31" text-anchor="middle"
          font-family="Inter,system-ui,sans-serif"
          font-size="16" font-weight="700" fill="#10b981">+300%</text>
    <text x="334" y="43" text-anchor="middle"
          font-family="Inter,system-ui,sans-serif"
          font-size="8.5" fill="rgba(16,185,129,0.75)">avg. sales growth</text>
  </g>

  <!-- "AI POWERED" badge top-left -->
  <rect x="14" y="10" width="104" height="22" rx="11"
        fill="rgba(140,69,255,0.2)" stroke="rgba(140,69,255,0.45)" stroke-width="1"/>
  <text x="66" y="25" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="10" font-weight="600" fill="#b665ff">⚡ AI POWERED</text>

  <!-- X-axis period label -->
  <text x="200" y="238" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="8.5" fill="rgba(255,255,255,0.22)" letter-spacing="1.2">
    30-DAY PERFORMANCE · REAL MARKET DATA
  </text>
</svg>
