<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img">
  <title>Zero cost to start - free access to global trade platform</title>

  <defs>
    <pattern id="dots-z" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="rgba(140,69,255,0.10)"/>
    </pattern>
    <radialGradient id="bg-z" cx="50%" cy="48%" r="68%">
      <stop offset="0%" stop-color="#1a0b35"/>
      <stop offset="100%" stop-color="#04010a"/>
    </radialGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8c45ff" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#8c45ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sparkle-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    /* 4-pointed sparkle pulse animations — staggered */
    .sp1 { animation: twinkle 2.8s ease-in-out infinite;              }
    .sp2 { animation: twinkle 2.8s ease-in-out infinite 0.55s;        }
    .sp3 { animation: twinkle 2.8s ease-in-out infinite 1.1s;         }
    .sp4 { animation: twinkle 2.8s ease-in-out infinite 1.65s;        }
    .sp5 { animation: twinkle 2.8s ease-in-out infinite 2.2s;         }
    .sp6 { animation: twinkle 2.8s ease-in-out infinite 0.9s;         }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; transform: scale(0.7)  rotate(0deg); }
      50%      { opacity: 1;    transform: scale(1.25) rotate(15deg); }
    }

    /* Decorative rings pulse outward */
    .ring-pulse { animation: ringOut 4s ease-out infinite; }
    .ring-p2    { animation: ringOut 4s ease-out infinite 2s; }
    @keyframes ringOut {
      0%   { r: 52; opacity: 0.35; }
      100% { r: 95; opacity: 0;    }
    }
  </style>

  <!-- Background -->
  <rect width="400" height="250" fill="url(#bg-z)"/>
  <rect width="400" height="250" fill="url(#dots-z)"/>

  <!-- Centre radial glow -->
  <ellipse cx="200" cy="122" rx="110" ry="110" fill="url(#center-glow)"/>

  <!-- Decorative concentric rings -->
  <circle cx="200" cy="122" r="72" fill="none" stroke="rgba(140,69,255,0.10)" stroke-width="1" stroke-dasharray="5 4"/>
  <circle cx="200" cy="122" r="52" fill="none" stroke="rgba(140,69,255,0.12)" stroke-width="1"/>

  <!-- Animated expanding rings (SMIL) -->
  <circle cx="200" cy="122" r="52" fill="none" stroke="rgba(140,69,255,0.35)" stroke-width="1.2" class="ring-pulse">
    <animate attributeName="r"       values="52;95;52" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0;0.35" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="122" r="52" fill="none" stroke="rgba(140,69,255,0.25)" stroke-width="1" class="ring-p2">
    <animate attributeName="r"       values="52;95;52" dur="4s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0;0.25" dur="4s" begin="2s" repeatCount="indefinite"/>
  </circle>

  <!-- ─── SPARKLE helper: 4-pointed star path centered at origin ─── -->
  <!-- Each sparkle is a <g transform="translate(x,y)"> containing the star path -->

  <!-- Sparkle 1 — top right large -->
  <g transform="translate(300, 52)" filter="url(#sparkle-glow)" class="sp1">
    <path d="M 0,-14 L 2.5,-2.5 L 14,0 L 2.5,2.5 L 0,14 L -2.5,2.5 L -14,0 L -2.5,-2.5 Z"
          fill="#b665ff"/>
  </g>

  <!-- Sparkle 2 — left mid -->
  <g transform="translate(72, 110)" filter="url(#sparkle-glow)" class="sp2">
    <path d="M 0,-10 L 2,-2 L 10,0 L 2,2 L 0,10 L -2,2 L -10,0 L -2,-2 Z"
          fill="#8c45ff"/>
  </g>

  <!-- Sparkle 3 — top left -->
  <g transform="translate(112, 54)" filter="url(#sparkle-glow)" class="sp3">
    <path d="M 0,-8 L 1.5,-1.5 L 8,0 L 1.5,1.5 L 0,8 L -1.5,1.5 L -8,0 L -1.5,-1.5 Z"
          fill="#c987ff"/>
  </g>

  <!-- Sparkle 4 — right lower -->
  <g transform="translate(328, 165)" filter="url(#sparkle-glow)" class="sp4">
    <path d="M 0,-11 L 2,-2 L 11,0 L 2,2 L 0,11 L -2,2 L -11,0 L -2,-2 Z"
          fill="#8c45ff"/>
  </g>

  <!-- Sparkle 5 — bottom left -->
  <g transform="translate(96, 186)" filter="url(#sparkle-glow)" class="sp5">
    <path d="M 0,-7 L 1.3,-1.3 L 7,0 L 1.3,1.3 L 0,7 L -1.3,1.3 L -7,0 L -1.3,-1.3 Z"
          fill="#b665ff"/>
  </g>

  <!-- Sparkle 6 — upper centre-right -->
  <g transform="translate(264, 36)" filter="url(#sparkle-glow)" class="sp6">
    <path d="M 0,-9 L 1.7,-1.7 L 9,0 L 1.7,1.7 L 0,9 L -1.7,1.7 L -9,0 L -1.7,-1.7 Z"
          fill="#c987ff"/>
  </g>

  <!-- "$0" — ghosted glow layer -->
  <text x="200" y="155" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="92" font-weight="800"
        fill="#8c45ff" opacity="0.18"
        filter="url(#text-glow)">$0</text>

  <!-- "$0" — solid layer -->
  <text x="200" y="155" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="92" font-weight="800"
        fill="url(#bg-z)" stroke="#8c45ff" stroke-width="1.5">$0</text>
  <!-- "$0" — filled -->
  <text x="200" y="155" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="92" font-weight="800" letter-spacing="-4"
        fill="#8c45ff">$0</text>

  <!-- "FREE FOREVER" subtitle -->
  <text x="200" y="182" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="11" font-weight="500" letter-spacing="3.5"
        fill="rgba(255,255,255,0.38)">FREE FOREVER</text>

  <!-- Stat badge (top) -->
  <rect x="96" y="10" width="208" height="24" rx="12"
        fill="rgba(140,69,255,0.22)" stroke="rgba(140,69,255,0.48)" stroke-width="1"/>
  <text x="200" y="26" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="11" font-weight="600" fill="#b665ff">Save $10,000+ in Setup Costs</text>

  <!-- Bottom caption -->
  <text x="200" y="238" text-anchor="middle"
        font-family="Inter,system-ui,sans-serif"
        font-size="8.5" fill="rgba(255,255,255,0.22)" letter-spacing="1.2">
    NO FEES · NO COMMISSIONS · NO CONTRACTS
  </text>
</svg>
